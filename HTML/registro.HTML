<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=+, initial-scale=1.0">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../CSS/registro.CSS">
    <title>Kaptal-Register</title>
</head>
<body>
    <div class="wrapper">
        <div class="register-box">
            <div class="register-header">
                <span>Welcome</span>
            </div>

            <div class="subtitle-header">
                Organiza tus finanzas y analiza tu patrimonio en un solo lugar.
            </div>

            <div class="input-box">
                <input type="text" id="user" class="input-field" required>
                <label for="user" class="label">User name</label>
                <i class="bx bx-user icon"></i>
            </div>

            <div class="input-box">
                <input type="email" id="email" class="input-field" required>
                <label for="email" class="label">Email</label>
                <i class="bx bx-envelope-open icon"></i>
            </div>

            <div class="input-box">
                <input type="password" id="pass" class="input-field" required>
                <label for="pass" class="label">Password</label>
                <i class="bx bx-lock-alt icon"></i>  
            </div>

            <div class="input-box">
                <input type="submit" class="input-submit" value="Register">
            </div>

            </div>
        </div>
    </div>
    <script src="../js/registro.js"></script>
</body>
</html>
